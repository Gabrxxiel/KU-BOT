<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KU Support Bot — ADMOSA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --green-light: #DCF8C6;
    --bg: #ECE5DD;
    --white: #fff;
    --gray: #f0f0f0;
    --gray2: #8696A0;
    --text: #111B21;
    --bubble-bot: #fff;
    --bubble-user: #DCF8C6;
    --shadow: 0 1px 2px rgba(0,0,0,.13);
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phone-shell {
    width: 420px;
    height: 780px;
    background: var(--white);
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,.25);
  }

  /* HEADER */
  .header {
    background: var(--green-dark);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    flex-shrink: 0;
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-info h1 { font-size: 15px; font-weight: 600; }
  .header-info p { font-size: 12px; opacity: .8; }
  .reset-btn {
    background: none; border: 1px solid rgba(255,255,255,.4);
    color: white; padding: 4px 10px; border-radius: 12px;
    cursor: pointer; font-size: 12px;
  }
  .reset-btn:hover { background: rgba(255,255,255,.15); }

  /* MESSAGES */
  .messages {
    flex: 1; overflow-y: auto; padding: 12px 10px;
    background: var(--bg);
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c5b59e' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 4px; }

  /* BUBBLE */
  .bubble-wrap {
    display: flex; margin-bottom: 4px;
    animation: fadeIn .2s ease;
  }
  .bubble-wrap.bot { justify-content: flex-start; }
  .bubble-wrap.user { justify-content: flex-end; }

  .bubble {
    max-width: 78%; padding: 8px 10px;
    border-radius: 8px; font-size: 14px;
    line-height: 1.45; word-break: break-word;
    box-shadow: var(--shadow);
    position: relative;
  }
  .bubble.bot { background: var(--bubble-bot); border-top-left-radius: 2px; color: var(--text); }
  .bubble.user { background: var(--bubble-user); border-top-right-radius: 2px; color: var(--text); }
  .bubble .time { font-size: 11px; color: var(--gray2); margin-top: 3px; text-align: right; }
  .bubble b { font-weight: 600; }

  /* OPTION BUTTONS */
  .option-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .option-btn {
    background: var(--white); border: 1.5px solid var(--green);
    color: var(--green-dark); padding: 8px 12px; border-radius: 20px;
    cursor: pointer; font-size: 13.5px; font-weight: 500;
    text-align: left; transition: all .15s;
  }
  .option-btn:hover { background: #e8f8f1; }
  .option-btn:active { transform: scale(.98); }
  .option-btn.selected { background: var(--green); color: white; border-color: var(--green); cursor: default; }

  /* ESCALATION CARD */
  .escalation-card {
    background: #FFF9E6; border: 1px solid #FFC107;
    border-radius: 10px; padding: 12px; margin-top: 8px;
    font-size: 13px;
  }
  .escalation-card .esc-title {
    font-weight: 700; color: #E65100; font-size: 14px;
    display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
  }
  .escalation-card .esc-row { display: flex; gap: 6px; margin-bottom: 4px; color: #333; }
  .escalation-card .esc-label { color: var(--gray2); min-width: 72px; font-size: 12px; }
  .escalation-card .esc-val { font-weight: 500; word-break: break-all; }
  .ticket-badge {
    display: inline-block; background: #E65100; color: white;
    font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  }
  .apex-link {
    display: block; margin-top: 8px; padding: 7px 10px;
    background: #128C7E; color: white; border-radius: 8px;
    text-align: center; font-size: 13px; font-weight: 600;
    text-decoration: none;
  }
  .apex-link:hover { background: #0e7065; }

  /* TYPING INDICATOR */
  .typing { display: flex; align-items: center; gap: 3px; padding: 10px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--gray2);
    animation: bounce .9s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }

  /* INPUT */
  .input-area {
    background: #F0F2F5; padding: 8px 12px;
    display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
  }
  .input-wrap {
    flex: 1; background: white; border-radius: 22px;
    display: flex; align-items: flex-end; padding: 8px 14px;
    box-shadow: var(--shadow);
  }
  textarea {
    flex: 1; border: none; outline: none; resize: none;
    font-size: 15px; font-family: inherit; max-height: 120px;
    min-height: 22px; line-height: 1.4; background: transparent;
  }
  .send-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--green-dark); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  .send-btn:hover { background: var(--green); }
  .send-btn:disabled { background: var(--gray2); cursor: default; }
  .send-btn svg { width: 20px; height: 20px; fill: white; }

  /* DISABLED state */
  .input-area.locked textarea { color: var(--gray2); cursor: default; }

  /* CONTEXT PILL */
  .context-pill {
    font-size: 11.5px; background: rgba(255,255,255,.9);
    color: var(--green-dark); padding: 3px 10px; border-radius: 12px;
    text-align: center; margin: 4px auto 8px; display: table;
    box-shadow: var(--shadow);
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-5px); } }
</style>
</head>
<body>

<div class="phone-shell">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">KU</div>
    <div class="header-info">
      <h1>KU Support Bot</h1>
      <p id="header-status">ADMOSA — Salesforce SFA</p>
    </div>
    <button class="reset-btn" onclick="resetChat()">↺ Reiniciar</button>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- INPUT -->
  <div class="input-area" id="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Escribe tu consulta…" rows="1"
        onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
// ──────────── STATE ────────────
let session = {};
const API = '/api/chat';

// ──────────── INIT ────────────
async function init() {
  const saved = localStorage.getItem('ku_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      session = s;
      // Restore from saved session — show a welcome back
      if (s.brand && s.channel) {
        const channelLabel = s.channel === 'AP' ? 'Agencias Propias' : 'Hipertiendas';
        addSystemPill(`${s.brand} — ${channelLabel}`);
        addBotBubble('¡Hola de nuevo! ¿En qué te puedo ayudar?');
        setHeaderStatus(`${s.brand} / ${channelLabel}`);
        enableInput();
        return;
      }
    } catch(e) {}
  }
  startFresh();
}

async function startFresh() {
  session = {};
  const data = await callAPI({ action: 'init' });
  handleResponse(data);
}

function resetChat() {
  localStorage.removeItem('ku_session');
  document.getElementById('messages').innerHTML = '';
  session = {};
  document.getElementById('input').value = '';
  document.getElementById('header-status').textContent = 'ADMOSA — Salesforce SFA';
  disableInput();
  startFresh();
}

// ──────────── API ────────────
async function callAPI(body) {
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...body, session }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    return { type: 'error', message: `Error de conexión: ${e.message}` };
  }
}

// ──────────── MESSAGE HANDLING ────────────
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoGrow(input);
  disableInput();

  // Show user bubble
  addUserBubble(text);
  showTyping();

  const data = await callAPI({ action: 'message', message: text });
  hideTyping();
  handleResponse(data);
  enableInput();
}

function handleResponse(data) {
  if (!data) return;

  if (data.session) {
    session = data.session;
    saveSession();
  }

  switch (data.type) {
    case 'brand_selection':
      addBotBubble(data.message, data.options, 'select_brand');
      disableInput('Selecciona una marca arriba');
      break;

    case 'channel_selection':
      addBotBubble(data.message, data.options, 'select_channel');
      disableInput('Selecciona un canal arriba');
      break;

    case 'ready':
      addBotBubble(data.message);
      if (session.brand && session.channel) {
        const channelLabel = session.channel === 'AP' ? 'Agencias Propias' : 'Hipertiendas';
        addSystemPill(`${session.brand} — ${channelLabel}`);
        setHeaderStatus(`${session.brand} / ${channelLabel}`);
      }
      enableInput();
      break;

    case 'message':
      addBotBubble(data.message);
      enableInput();
      break;

    case 'escalation':
      addBotBubble(data.message || 'Este caso requiere atención del Key User.');
      addEscalationCard(data.ticket);
      disableInput('Ticket escalado al KU');
      break;

    case 'error':
      addBotBubble(`⚠️ ${data.message}`);
      enableInput();
      break;
  }

  scrollToBottom();
}

// ──────────── BUTTON SELECTION ────────────
async function selectOption(action, value, btnEl) {
  // Disable all buttons in that group
  const group = btnEl.closest('.option-list');
  group.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    b.style.opacity = '0.6';
  });
  btnEl.classList.add('selected');
  btnEl.style.opacity = '1';

  // Show as user message
  addUserBubble(btnEl.textContent.trim());
  showTyping();

  const data = await callAPI({ action, message: value });
  hideTyping();
  handleResponse(data);
}

// ──────────── BUBBLE BUILDERS ────────────
function addBotBubble(text, options, optionAction) {
  const wrap = div('bubble-wrap bot');
  const bubble = div('bubble bot');
  bubble.innerHTML = formatText(text);

  if (options?.length) {
    const list = div('option-list');
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = typeof opt === 'string' ? opt : opt.label;
      const val = typeof opt === 'string' ? opt : opt.value;
      btn.onclick = () => selectOption(optionAction, val, btn);
      list.appendChild(btn);
    });
    bubble.appendChild(list);
  }

  bubble.innerHTML += `<div class="time">${nowTime()}</div>`;
  wrap.appendChild(bubble);
  msgs().appendChild(wrap);
}

function addUserBubble(text) {
  const wrap = div('bubble-wrap user');
  const bubble = div('bubble user');
  bubble.innerHTML = formatText(text) + `<div class="time">${nowTime()} ✓✓</div>`;
  wrap.appendChild(bubble);
  msgs().appendChild(wrap);
}

function addEscalationCard(ticket) {
  const wrap = div('bubble-wrap bot');
  const bubble = div('bubble bot');
  bubble.style.maxWidth = '82%';

  bubble.innerHTML = `
    <div class="escalation-card">
      <div class="esc-title">🔔 Ticket creado en APEX</div>
      <div class="esc-row">
        <span class="esc-label">Ticket</span>
        <span class="esc-val"><span class="ticket-badge">${ticket.id}</span></span>
      </div>
      <div class="esc-row">
        <span class="esc-label">Marca</span>
        <span class="esc-val">${ticket.brand} — ${ticket.channel_label}</span>
      </div>
      <div class="esc-row">
        <span class="esc-label">KU</span>
        <span class="esc-val">${ticket.ku_name}</span>
      </div>
      <div class="esc-row">
        <span class="esc-label">Email</span>
        <span class="esc-val">${ticket.ku_email}</span>
      </div>
      <div class="esc-row">
        <span class="esc-label">WhatsApp</span>
        <span class="esc-val">${ticket.ku_whatsapp}</span>
      </div>
      <div class="esc-row">
        <span class="esc-label">Creado</span>
        <span class="esc-val">${ticket.created_at}</span>
      </div>
      <a class="apex-link" href="${ticket.apex_url}" target="_blank">
        📋 Ver en APEX →
      </a>
    </div>
    <div class="time" style="margin-top:6px">${nowTime()}</div>`;

  wrap.appendChild(bubble);
  msgs().appendChild(wrap);
}

function addSystemPill(text) {
  const pill = document.createElement('div');
  pill.className = 'context-pill';
  pill.textContent = text;
  msgs().appendChild(pill);
}

// ──────────── TYPING INDICATOR ────────────
function showTyping() {
  const wrap = div('bubble-wrap bot');
  wrap.id = 'typing-indicator';
  const bubble = div('bubble bot typing');
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(bubble);
  msgs().appendChild(wrap);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ──────────── INPUT ────────────
function enableInput(placeholder = 'Escribe tu consulta…') {
  const ia = document.getElementById('input-area');
  const inp = document.getElementById('input');
  const btn = document.getElementById('send-btn');
  ia.classList.remove('locked');
  inp.placeholder = placeholder;
  inp.disabled = false;
  btn.disabled = false;
  inp.focus();
}

function disableInput(placeholder = 'Esperando…') {
  const ia = document.getElementById('input-area');
  const inp = document.getElementById('input');
  const btn = document.getElementById('send-btn');
  ia.classList.add('locked');
  inp.placeholder = placeholder;
  inp.disabled = true;
  btn.disabled = true;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ──────────── UTILS ────────────
function div(cls) {
  const el = document.createElement('div');
  el.className = cls;
  return el;
}
function msgs() { return document.getElementById('messages'); }
function scrollToBottom() {
  const m = msgs();
  setTimeout(() => m.scrollTop = m.scrollHeight, 50);
}
function nowTime() {
  return new Date().toLocaleTimeString('es-GT', { hour: '2-digit', minute: '2-digit' });
}
function saveSession() {
  try { localStorage.setItem('ku_session', JSON.stringify(session)); } catch(e) {}
}
function setHeaderStatus(text) {
  document.getElementById('header-status').textContent = text;
}
function formatText(text) {
  return text
    .replace(/\*([^*]+)\*/g, '<b>$1</b>')
    .replace(/\n/g, '<br>');
}

// ──────────── START ────────────
init();
</script>
</body>
</html>
